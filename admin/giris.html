<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<!-- İçerik Güvenlik Politikası (FAZ D / K-A5) — Worker securityHeaders.ts ile aynı policy.
     frame-ancestors meta-CSP'de geçersiz olduğu için çıkarıldı (yalnız HTTP header'da etkin). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>BOTL — Yönetim Girişi</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0E0D0B">
<style>
  :root {
    --bg:#0E0D0B;
    --surface:#1A1815;
    --surface-2:#221F1B;
    --border:#2E2A24;
    --text:#FAF8F5;
    --text-muted:#9C958A;
    --accent:#C8A05A;
    --accent-soft:#A88543;
    --err-bg:rgba(180,40,40,.12);
    --err-fg:#FF8E8E;
    --err-border:#7A2A2A;
    --sans:'Inter','SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --serif:'Cormorant Garamond','Playfair Display',Georgia,serif;
  }
  *,*::before,*::after { box-sizing:border-box }
  html,body { margin:0; padding:0 }
  body {
    background:var(--bg); color:var(--text);
    font-family:var(--sans);
    min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .login-card {
    background:var(--surface);
    border:1px solid var(--border);
    padding:42px 44px;
    width:100%; max-width:420px;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
  .login-brand {
    text-align:center;
    margin:0 0 26px;
    font-family:var(--sans);
    font-size:11px; letter-spacing:.32em; font-weight:600;
    color:var(--text-muted);
    text-transform:uppercase;
  }
  .login-title {
    font-family:var(--serif);
    font-size:26px; font-weight:500;
    letter-spacing:.02em;
    margin:0 0 8px;
  }
  .login-sub {
    font-size:12px; color:var(--text-muted);
    margin:0 0 28px; line-height:1.55;
  }
  .login-label {
    display:block;
    font-size:11px; letter-spacing:.08em;
    text-transform:uppercase;
    margin:0 0 6px;
    color:var(--text-muted);
  }
  .login-input {
    width:100%;
    padding:13px 14px;
    font-size:16px; /* iOS zoom prevent */
    min-height:46px;
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--border);
    font-family:var(--sans);
    transition:border-color .15s ease;
  }
  .login-input:focus {
    outline:none;
    border-color:var(--accent-soft);
  }
  .login-field { margin-bottom:16px }
  .login-btn {
    width:100%;
    margin-top:8px;
    padding:14px 18px;
    min-height:50px;
    background:#FAF8F5;
    color:#1A1A1A;
    border:none;
    font-family:var(--sans);
    font-size:13px; letter-spacing:.1em;
    text-transform:uppercase; font-weight:600;
    cursor:pointer;
    transition:background .15s ease,color .15s ease;
  }
  .login-btn:hover { background:#fff }
  .login-btn:disabled {
    background:var(--surface-2);
    color:var(--text-muted);
    cursor:wait;
  }
  .login-err {
    margin-top:16px;
    padding:10px 14px;
    font-size:12px;
    background:var(--err-bg);
    color:var(--err-fg);
    border:1px solid var(--err-border);
  }
  .login-err[hidden] { display:none }
  .login-foot {
    margin-top:28px;
    text-align:center;
    font-size:11px;
    color:var(--text-muted);
    letter-spacing:.04em;
  }
</style>
</head>
<body>

<main class="login-card" role="main" aria-labelledby="login-title">
  <p class="login-brand">Bags of the Loom</p>
  <h1 class="login-title" id="login-title">Yönetim Girişi</h1>
  <p class="login-sub">Bu alana sadece yetkili kişi girebilir. Oturum tarayıcıda 24 saat saklanır.</p>

  <form id="login-form" autocomplete="off" novalidate>
    <div class="login-field">
      <label class="login-label" for="login-username">Kullanıcı Adı</label>
      <input class="login-input" id="login-username" name="username"
             type="text" autocomplete="username" required autofocus>
    </div>
    <div class="login-field">
      <label class="login-label" for="login-password">Parola</label>
      <input class="login-input" id="login-password" name="password"
             type="password" autocomplete="current-password"
             required aria-describedby="login-err">
    </div>
    <button class="login-btn" id="login-submit" type="submit">Giriş</button>
    <div class="login-err" id="login-err" hidden role="alert" aria-live="polite"></div>
  </form>

  <p class="login-foot">v2 · 2026</p>
</main>

<script>
/* ────────────────────────────────────────────────────────────
   BOTL Admin Login — standalone sayfa (admin/giris.html)
   Gerçek API login: /api/admin/login'e POST → session token.
   Token localStorage.botl_admin_session'a yazılır; admin/index.html
   bunu kontrol eder + her API çağrısında X-Botl-Admin-Session header'ı
   gönderir. HTTP Basic Auth ve tarayıcı popup'ı YOK.
   ────────────────────────────────────────────────────────── */
(function(){
  'use strict';
  const ADMIN_SESSION_KEY = 'botl_admin_session';
  const ADMIN_SESSION_TTL_MS = 24 * 60 * 60 * 1000; // 24 saat

  // Zaten geçerli oturum varsa direkt admin'e geç.
  try {
    const raw = localStorage.getItem(ADMIN_SESSION_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.token && d.expiresAt && Date.now() < Number(d.expiresAt)) {
        location.replace('./index.html');
        return;
      }
    }
  } catch (_) { /* yoksay, login formuna düş */ }

  // API base — admin/config.json'dan (head loader set etmemişse kendin oku).
  async function getApiBase(){
    if (typeof window !== 'undefined' && window.__BOTL_API_BASE__) {
      return window.__BOTL_API_BASE__;
    }
    try {
      const r = await fetch('./config.json?v=' + Date.now(), { cache: 'no-store' });
      if (r.ok) { const c = await r.json(); if (c && c.api_base) return c.api_base; }
    } catch (_) {}
    return '';
  }

  function showError(msg){
    const err = document.getElementById('login-err');
    if (!err) return;
    err.textContent = msg;
    err.hidden = false;
  }
  function clearError(){
    const err = document.getElementById('login-err');
    if (err){ err.hidden = true; err.textContent = ''; }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('login-form');
    const btn  = document.getElementById('login-submit');
    if (!form) return;

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      clearError();
      const username = (document.getElementById('login-username').value || '').trim();
      const password = (document.getElementById('login-password').value || '');
      if (!username || !password){ showError('Kullanıcı adı ve parola gir'); return; }
      btn.disabled = true; btn.textContent = 'Kontrol ediliyor';
      try {
        const apiBase = await getApiBase();
        const r = await fetch(apiBase + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ kullanici_adi: username, parola: password }),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.token) {
          localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify({
            token: data.token,
            admin: data.admin || username,
            expiresAt: Date.now() + ADMIN_SESSION_TTL_MS,
            grantedAt: new Date().toISOString(),
          }));
          location.replace('./index.html');
        } else if (r.status === 401) {
          showError('Kullanıcı adı veya parola hatalı');
          btn.disabled = false; btn.textContent = 'Giriş';
        } else {
          showError('Giriş yapılamadı, tekrar deneyin');
          btn.disabled = false; btn.textContent = 'Giriş';
        }
      } catch (e) {
        showError('Bağlantı kurulamadı, tekrar deneyin');
        btn.disabled = false; btn.textContent = 'Giriş';
      }
    });
  });
})();
</script>

</body>
</html>
